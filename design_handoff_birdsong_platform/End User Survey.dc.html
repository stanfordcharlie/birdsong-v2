<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/birdsong-8ad57c95-ea98-4ba5-968a-39df4900c5c4/fonts/fonts.css">
  <link rel="stylesheet" href="_ds/birdsong-8ad57c95-ea98-4ba5-968a-39df4900c5c4/_ds_bundle.css">
  <link rel="stylesheet" href="_ds/birdsong-8ad57c95-ea98-4ba5-968a-39df4900c5c4/styles.css">
  <script src="_ds/birdsong-8ad57c95-ea98-4ba5-968a-39df4900c5c4/_ds_bundle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Archivo:wght@400;500;600;700&display=swap">
  <style>
    body { margin: 0; background: #f8f8f7; }
    a { color: #4338ca; text-decoration: none; }
    a:hover { color: #1c1917; }
    @keyframes bs-rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bs-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }
  </style>
</helmet>

<div style="min-height: 100vh; width: 100%; background: #f8f8f7; display: flex; flex-direction: column; font-family: 'Archivo', sans-serif; box-sizing: border-box;">

  <div style="position: fixed; top: 0; left: 0; right: 0; height: 3px; background: #edece8;">
    <div style="height: 100%; background: #1c1917; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); width: {{ progressPct }};"></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; padding: 28px 40px;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><path d="M4 17 C4 9, 10 5, 17 5 C17 5, 16 8, 14 9.5 C18 9.5, 21 8, 21 8 C20 15, 14 19, 8 19 L5 22" stroke="#1c1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="15.5" cy="7.5" r="0.9" fill="#1c1917"></circle></svg>
      <span style="font-size: 14px; font-weight: 600; color: #1c1917;">CivicRec renewal interview</span>
    </div>
    <span style="font-size: 13px; font-weight: 500; color: #a8a29e;">{{ stepLabel }}</span>
  </div>

  <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 40px 96px; box-sizing: border-box;">
    <div style="width: 100%; max-width: 640px;">

      <sc-if value="{{ finished }}" hint-placeholder-val="{{ false }}">
        <div style="text-align: center; animation: bs-rise 0.6s ease-out both;">
          <h1 style="font-family: 'Young Serif', serif; font-size: 38px; font-weight: 400; color: #1c1917; margin: 0 0 14px; line-height: 1.2;">That's everything. Thank you.</h1>
          <p style="font-size: 16px; color: #78716c; margin: 0; line-height: 1.6;">Your answers are on their way to the team.<br>You can close this window.</p>
        </div>
      </sc-if>

      <sc-if value="{{ notFinished }}" hint-placeholder-val="{{ true }}">
        <div key="{{ step }}" style="animation: bs-rise 0.5s ease-out both;">
          <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #a8a29e; margin-bottom: 22px;">
            <span style="width: 7px; height: 7px; border-radius: 50%; background: #a5b4fc; display: inline-block; animation: bs-dot 2s ease-in-out infinite;"></span>
            Wren is asking
          </div>
          <h1 style="font-family: 'Young Serif', serif; font-size: 34px; font-weight: 400; color: #1c1917; margin: 0 0 32px; line-height: 1.3; text-wrap: pretty;">{{ questionText }}</h1>
          <x-import component-from-global-scope="Birdsong.Textarea" hint-size="100%,120px" value="{{ answer }}" on-change="{{ onAnswerChange }}" placeholder="Take your time — plain language is perfect." rows="{{ four }}" style="font-family: 'Archivo', sans-serif; font-size: 16px; background: #ffffff;"></x-import>
          <div style="display: flex; align-items: center; gap: 16px; margin-top: 20px;">
            <button onClick="{{ onContinue }}" style="font-family: 'Archivo', sans-serif; font-size: 15px; font-weight: 600; color: #f5f4ef; background: #1c1917; border: none; border-radius: 8px; padding: 12px 26px; cursor: pointer; display: flex; align-items: center; gap: 8px;" style-hover="background: #44403c;">
              Continue
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
            <span style="font-size: 13px; color: #a8a29e;">or press <strong style="font-weight: 600; color: #78716c;">⌘ Enter</strong></span>
          </div>
        </div>
      </sc-if>

    </div>
  </div>

  <div style="text-align: center; padding: 0 0 24px;">
    <span style="font-size: 12px; color: #a8a29e;">Powered by <a href="Birdsong Home v2.dc.html" style="font-family: 'Young Serif', serif; color: #78716c;">Birdsong</a></span>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { step: 0, answer: '', answers: [] };
  questions = [
    'How does your department handle program registration today?',
    'What prompted you to look at alternatives this year?',
    'Walk me through the last registration season that really tested your team.',
    'Who else is involved in the renewal decision, and what do they care about?',
    'What would need to be true for switching to feel worth the disruption?'
  ];
  componentDidMount() {
    this.keyHandler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') this.continueNow();
    };
    window.addEventListener('keydown', this.keyHandler);
  }
  componentWillUnmount() { window.removeEventListener('keydown', this.keyHandler); }
  continueNow() {
    if (this.state.step >= this.questions.length) return;
    this.setState(s => ({
      answers: [...s.answers, s.answer],
      answer: '',
      step: s.step + 1
    }));
  }
  renderVals() {
    const total = this.questions.length;
    const step = this.state.step;
    const finished = step >= total;
    return {
      step,
      finished,
      notFinished: !finished,
      four: 4,
      stepLabel: finished ? 'Complete' : 'Question ' + (step + 1) + ' of ' + total,
      progressPct: Math.round(Math.min(step, total) / total * 100) + '%',
      questionText: finished ? '' : this.questions[step],
      answer: this.state.answer,
      onAnswerChange: (e) => this.setState({ answer: e.target.value }),
      onContinue: () => this.continueNow()
    };
  }
}
</script>
</body>
</html>
