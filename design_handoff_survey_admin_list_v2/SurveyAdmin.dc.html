<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Survey Admin" description="App shell + survey list, Inter type, Birdsong tokens" -->
<helmet>
<script src="./ds-base.js"></script>
<style>
@font-face{font-family:"Inter";font-style:normal;font-weight:100 900;font-display:swap;src:url(../../fonts/ba9851c3c22cd980-s.woff2) format("woff2")}
.survey-row:hover{background:var(--ds-color-secondary,#f1f1ef)}
.nav-icon{transition:background .12s ease}
.nav-icon:hover{background:rgba(255,255,255,.08)}
</style>
</helmet>
<div style="display:flex;height:100vh;background:#f8f8f7;font-family:'Inter',ui-sans-serif,system-ui;color:#18181b">
<aside style="width:72px;flex:0 0 72px;background:oklch(0.19 0.004 285);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:28px">
<div style="width:32px;height:32px;border-radius:9px;background:oklch(0.58 0.19 265);display:flex;align-items:center;justify-content:center">
<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="white" stroke-width="1.6"></circle></svg>
</div>
<nav style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
<div title="Home" class="nav-icon" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer">
<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 8l6-5 6 5v7a1 1 0 01-1 1H4a1 1 0 01-1-1V8z" stroke="rgba(255,255,255,.72)" stroke-width="1.5" stroke-linejoin="round"></path></svg>
</div>
<div title="Surveys" class="nav-icon" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.12)">
<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3.5" y="2.5" width="11" height="13" rx="1.5" stroke="#fff" stroke-width="1.5"></rect><line x1="6" y1="6.5" x2="12" y2="6.5" stroke="#fff" stroke-width="1.3"></line><line x1="6" y1="9.5" x2="12" y2="9.5" stroke="#fff" stroke-width="1.3"></line></svg>
</div>
<div title="Respondents" class="nav-icon" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer">
<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6.5" r="2.5" stroke="rgba(255,255,255,.72)" stroke-width="1.5"></circle><path d="M3.5 15c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5" stroke="rgba(255,255,255,.72)" stroke-width="1.5"></path></svg>
</div>
<div title="Settings" class="nav-icon" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer">
<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.6" stroke="rgba(255,255,255,.72)" stroke-width="1.5"></circle><circle cx="9" cy="9" r="6" stroke="rgba(255,255,255,.72)" stroke-width="1.1" stroke-dasharray="1.5 2.2"></circle></svg>
</div>
</nav>
<div style="flex:1"></div>
<div style="width:30px;height:30px;border-radius:8px;background:oklch(0.6 0.14 145);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white">S</div>
</aside>
<main style="flex:1;overflow:auto;padding:48px 56px">
<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px">
<div>
<div style="font-size:13px;color:#9c9c98;font-weight:500;margin-bottom:6px">Surveys</div>
<h1 style="font-size:28px;font-weight:600;letter-spacing:-0.01em;margin:0">Your Surveys</h1>
</div>
<x-import component-from-global-scope="Birdsong.Button" variant="primary" onClick="{{ noop }}" hint-size="130px,40px">New survey</x-import>
</div>
<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
<div style="flex:1;max-width:320px">
<x-import component-from-global-scope="Birdsong.Input" placeholder="Search surveys" value="{{ query }}" onChange="{{ setQuery }}" hint-size="100%,38px"></x-import>
</div>
<div style="display:flex;gap:6px">
<div style="padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#18181b;color:white;border:1px solid #18181b">All</div>
<div style="padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:white;color:#3f3f3a;border:1px solid #e5e5e2">Live</div>
</div>
</div>
<div style="background:white;border:1px solid #eaeae7;border-radius:12px;overflow:hidden">
<x-import component-from-global-scope="Birdsong.Table" hint-size="100%,auto">
<x-import component-from-global-scope="Birdsong.TableHeader" hint-size="100%,44px">
<x-import component-from-global-scope="Birdsong.TableRow" hint-size="100%,44px">
<x-import component-from-global-scope="Birdsong.TableHead" hint-size="200px,44px">Internal name</x-import>
<x-import component-from-global-scope="Birdsong.TableHead" hint-size="140px,44px">Status</x-import>
<x-import component-from-global-scope="Birdsong.TableHead" hint-size="220px,44px">Slug</x-import>
<x-import component-from-global-scope="Birdsong.TableHead" hint-size="120px,44px">Responses</x-import>
<x-import component-from-global-scope="Birdsong.TableHead" hint-size="180px,44px">Created</x-import>
</x-import>
</x-import>
<x-import component-from-global-scope="Birdsong.TableBody" hint-size="100%,auto">
<sc-for list="{{ surveys }}" as="s" hint-placeholder-count="3">
<x-import component-from-global-scope="Birdsong.TableRow" class="survey-row" hint-size="100%,56px">
<x-import component-from-global-scope="Birdsong.TableCell" hint-size="200px,56px">
<span style="font-weight:500;color:#4f46e5;cursor:pointer">{{ s.name }}</span>
</x-import>
<x-import component-from-global-scope="Birdsong.TableCell" hint-size="140px,56px">
<x-import component-from-global-scope="Birdsong.Badge" variant="{{ s.badgeVariant }}" hint-size="60px,22px">{{ s.status }}</x-import>
</x-import>
<x-import component-from-global-scope="Birdsong.TableCell" hint-size="220px,56px">
<span style="font-family:'Inter',ui-sans-serif,system-ui;font-size:13px;color:#71716b">{{ s.slug }}</span>
</x-import>
<x-import component-from-global-scope="Birdsong.TableCell" hint-size="120px,56px">
<span style="color:#3f3f3a">{{ s.responses }}</span>
</x-import>
<x-import component-from-global-scope="Birdsong.TableCell" hint-size="180px,56px">
<span style="color:#9c9c98;font-size:13px">{{ s.created }}</span>
</x-import>
</x-import>
</sc-for>
</x-import>
</x-import>
</div>
</main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800}}">
class Component extends DCLogic {
  state = { query: "" };
  renderVals() {
    const surveys = [
      { name: "Customer Feedback Habits", slug: "customer-feedback-habits", status: "Live", badgeVariant: "success", responses: 128, created: "Jul 1, 2026" },
      { name: "Renewal Interview", slug: "renewal-interview-2026", status: "Live", badgeVariant: "success", responses: 64, created: "Jun 28, 2026" },
      { name: "Onboarding Pulse Check", slug: "onboarding-pulse-check", status: "Draft", badgeVariant: "warning", responses: 0, created: "Jun 20, 2026" }
    ];
    const q = this.state.query.trim().toLowerCase();
    return {
      surveys: q ? surveys.filter(s => s.name.toLowerCase().includes(q)) : surveys,
      query: this.state.query,
      setQuery: (e) => this.setState({ query: e.target ? e.target.value : e }),
      noop: () => {}
    };
  }
}
</script>
</body>
</html>
